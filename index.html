<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ドラえもん人狼</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div class="loading">ゲームを読み込み中...</div>
    </div>

    <script type="module">
        import { changePhase } from './js/main.js';

        // ページ読み込み完了時に、自動的にConfig画面（設定画面）を表示する
        window.addEventListener('DOMContentLoaded', () => {
            changePhase("CONFIG");
        });
    </script>
</body>
</html>
